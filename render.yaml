services:
  - type: web
    name: cleanreport-api
    runtime: docker
    repo: https://github.com/circorangeintern/axion-circle
    rootDir: backend
    plan: free
    buildCommand: ./gradlew bootJar
    startCommand: java -jar build/libs/cleanreport-api-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/v1/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://cleanreport.vercel.app
      - key: SPRING_PROFILES_ACTIVE
        value: prod
