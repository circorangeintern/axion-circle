version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: cleanreport-db
    environment:
      POSTGRES_DB: cleanreport
      POSTGRES_USER: cleanreport
      POSTGRES_PASSWORD: cleanreport
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanreport"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
